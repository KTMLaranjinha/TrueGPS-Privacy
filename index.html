        title: "🔒 개인정보 처리방침",
        updated: "최종 업데이트: 2026년 1월",
        s1t: "1. 데이터 수집",
        s1p: "TrueGPS Speed 앱은 개인을 식별할 수 있는 어떠한 데이터도 수집, 저장 또는 공유하지 않습니다. 모든 처리는 기기 내에서 로컬로 수행되며, 정보는 기기 외부로 전송되지 않습니다.",
        s2t: "2. 위치 정보",
        s2p: "위치 정보는 실시간으로 속도를 계산하고 HUD에 표시하기 위한 목적으로만 사용됩니다. 위치 데이터는 저장되거나 외부 서버로 전송되지 않습니다.",
        s3t: "3. 저장",
        s3p: "설정, HUD 및 사용자 환경설정은 전적으로 사용자의 기기에만 저장되며 외부와 공유되거나 동기화되지 않습니다.",
        s4t: "4. 제3자 및 광고",
        s4p1: "본 앱은 자체적으로 제3자와 데이터를 공유하지 않습니다. 사용자가 광고를 시청하여 크레딧을 획득하기로 선택한 경우에만, 제3자 서비스(예: Google)가 제공하는 선택적 보상형 동영상 광고를 사용합니다.",
        s4p2: "본 앱은 자체적인 추적 또는 맞춤형 분석을 수행하지 않습니다.",
        s5t: "5. 변경 사항",
        s5p: "본 정책은 향후 앱 버전에서 업데이트될 수 있습니다. 정기적인 검토를 권장합니다.",
        ct: "문의",
        cp: "문의 사항이 있는 경우, 앱의 Google Play 페이지에 기재된 이메일 주소를 통해 개발자에게 연락하시기 바랍니다."
      }
    };

    const titleEl = document.getElementById("title");
    const updatedEl = document.getElementById("updatedLine");
    const buttonsEl = document.getElementById("langButtons");
    const contentEl = document.getElementById("content");

    function card(h, p1, p2) {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<h2>${h}</h2><p>${p1}</p>` + (p2 ? `<p class="muted">${p2}</p>` : "");
      return div;
    }

    function render(lang) {
      const d = T[lang] || T.EN;

      document.documentElement.lang = d.htmlLang;
      titleEl.textContent = d.title;
      updatedEl.textContent = d.updated;
      document.title = `${d.title} — TrueGPS Speed`;

      contentEl.innerHTML = "";
      contentEl.appendChild(card(d.s1t, d.s1p));
      contentEl.appendChild(card(d.s2t, d.s2p));
      contentEl.appendChild(card(d.s3t, d.s3p));
      contentEl.appendChild(card(d.s4t, d.s4p1, d.s4p2));
      contentEl.appendChild(card(d.s5t, d.s5p));
      contentEl.appendChild(card(d.ct, d.cp));

      [...buttonsEl.querySelectorAll("button")].forEach(b => b.classList.remove("active"));
      const btn = document.getElementById("btn_" + lang);
      if (btn) btn.classList.add("active");

      history.replaceState(null, "", "#" + lang.toLowerCase());
    }

    // Build buttons in same order as your translations
    const order = ["EN","PT","BR","FR","ES","DE","IT","RU","HI","ID","TR","JA","KO"];
    order.forEach(lang => {
      const b = document.createElement("button");
      b.id = "btn_" + lang;
      b.textContent = lang;
      b.onclick = () => render(lang);
      buttonsEl.appendChild(b);
    });

    // Default EN (Play Console friendly), but allow #pt, #fr, etc.
    const hash = (location.hash || "").replace("#","").toUpperCase();
    render(T[hash] ? hash : "EN");
</script>

</body>
</html>
